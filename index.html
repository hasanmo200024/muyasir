<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#14263a">
<title>مُيسِّر — تأسيس القراءة والكتابة والحساب</title>
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@500;600;700&family=Noto+Naskh+Arabic:wght@400..700&family=Aref+Ruqaa:wght@400;700&family=Rakkas&family=Cairo:wght@300;400;500;600;700;800&family=Baloo+2:wght@400;600;700&family=Changa:wght@400;600;700&family=Architects+Daughter&family=Patrick+Hand&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-900:#14263a; --ink-700:#1f3b57; --ink-500:#4a5a68; --ink-300:#8996a3;
    --gold-600:#b6862f; --gold-500:#c69a45; --gold-300:#e3c988; --gold-100:#f5ecd6;
    --sage-600:#3f6f66; --sage-300:#9fc2ba;
    --parchment:#f5f0e3; --paper:#fffefb; --line:#e3ddc9; --line-2:#ece6d5;
    --danger:#a8452c; --radius-sm:8px; --radius:12px; --radius-lg:18px;
    --shadow-sm:0 1px 3px rgba(20,38,58,.08); --shadow-md:0 6px 20px rgba(20,38,58,.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--parchment);
    color:var(--ink-900); font-family:'Cairo',sans-serif; min-height:100vh; font-size:15px;
  }
  h1,h2,h3{font-family:'El Messiri',sans-serif;}

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;padding:14px 26px;
    background:var(--ink-900);color:#fff;position:sticky;top:0;z-index:50;
    border-bottom:3px solid var(--gold-600);flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-300);}
  .brand h1{font-size:19px;margin:0;font-weight:700;letter-spacing:.2px;}
  .brand span{display:block;font-size:11px;font-weight:400;color:var(--gold-300);margin-top:1px;font-family:'Cairo';}
  .install-btn{
    display:none;background:var(--gold-500);color:var(--ink-900);border:none;font-weight:700;
    padding:8px 16px;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:'Cairo';
  }
  .install-btn.show{display:inline-block;}
  .queue-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(230,201,136,.35);
    color:var(--gold-300);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Cairo';font-weight:600;}
  .queue-btn:hover{background:rgba(230,201,136,.15);}
  .queue-badge{background:var(--gold-500);color:var(--ink-900);border-radius:999px;font-size:10.5px;font-weight:800;
    padding:1px 7px;min-width:16px;text-align:center;display:inline-block;}
  .action-btn.queue-add{background:var(--sage-600);color:#fff;}

  .queue-wrap{max-width:800px;margin:0 auto;padding:34px 26px 60px;}
  .queue-title{font-size:20px;color:var(--ink-700);font-weight:700;margin-bottom:18px;}
  .queue-empty{text-align:center;color:var(--ink-300);font-size:13px;padding:50px 0;}
  .queue-item{display:flex;align-items:center;gap:12px;background:var(--paper);border:1px solid var(--line);
    border-radius:var(--radius);padding:12px 14px;margin-bottom:10px;}
  .queue-item .qi-num{width:26px;height:26px;border-radius:50%;background:var(--ink-900);color:var(--gold-300);
    display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex:none;}
  .queue-item .qi-title{flex:1;font-size:13px;color:var(--ink-700);font-weight:600;}
  .queue-item .qi-remove{background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;padding:4px 8px;}
  .queue-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;justify-content:center;}
  .queue-actions .action-btn.danger{background:transparent;border:1.3px solid var(--danger);color:var(--danger);}

  /* ---------- Subject tabs (segmented, underline style) ---------- */
  .subject-tabs{
    display:flex;gap:2px;max-width:1280px;margin:0 auto;padding:0 26px;background:var(--ink-700);
    overflow-x:auto;
  }
  .subject-tab{
    flex:1;min-width:130px;display:flex;align-items:center;justify-content:center;gap:7px;padding:13px 10px;
    cursor:pointer;color:rgba(255,255,255,.6);font-weight:600;font-size:13px;border-bottom:3px solid transparent;
    white-space:nowrap;font-family:'Cairo';
  }
  .subject-tab .ic{font-size:15px;}
  .subject-tab.active{color:#fff;border-bottom-color:var(--gold-500);background:rgba(255,255,255,.04);}

  /* ---------- Home screen ---------- */
  .home-wrap{max-width:1100px;margin:0 auto;padding:44px 26px 60px;}
  .home-title{font-size:24px;color:var(--ink-700);font-weight:700;margin-bottom:4px;text-align:center;}
  .home-sub{font-size:13px;color:var(--ink-300);text-align:center;margin-bottom:34px;}
  .home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;}
  .home-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-lg);padding:26px 20px;
    text-align:center;cursor:pointer;box-shadow:var(--shadow-sm);transition:.15s;}
  .home-card:hover{border-color:var(--gold-500);box-shadow:var(--shadow-md);transform:translateY(-2px);}
  .home-card .hc-badge{width:60px;height:60px;border-radius:50%;background:var(--ink-900);color:var(--gold-300);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;}
  .home-card .hc-title{font-size:15px;font-weight:700;color:var(--ink-700);margin-bottom:4px;}
  .home-card .hc-count{font-size:11px;color:var(--ink-300);}

  .section-topbar{display:flex;align-items:center;gap:10px;max-width:1280px;margin:0 auto;padding:14px 26px 0;}
  .back-btn{display:flex;align-items:center;gap:6px;background:none;border:1.3px solid var(--line);color:var(--ink-700);
    padding:7px 14px;border-radius:8px;font-size:12.5px;cursor:pointer;font-family:'Cairo';font-weight:700;}
  .back-btn:hover{border-color:var(--gold-500);}
  .section-crumb{font-size:13px;color:var(--ink-300);font-weight:600;}
  .section-crumb b{color:var(--ink-700);}

  .shell{max-width:1280px;margin:0 auto;padding:24px 26px 56px;}

  /* ---------- Template gallery ---------- */
  .gallery-label{font-size:12px;color:var(--ink-500);font-weight:700;margin-bottom:10px;letter-spacing:.3px;}
  .gallery{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;margin-bottom:20px;}
  .tpl-card{
    flex:none;min-width:148px;border:1px solid var(--line);border-radius:var(--radius);padding:14px 12px;
    text-align:center;cursor:pointer;background:var(--paper);transition:.15s;box-shadow:var(--shadow-sm);
  }
  .tpl-card .badge{
    width:38px;height:38px;border-radius:50%;background:var(--ink-900);color:var(--gold-300);
    display:flex;align-items:center;justify-content:center;font-size:17px;margin:0 auto 8px;
  }
  .tpl-card .ti{font-size:12.5px;font-weight:700;color:var(--ink-700);}
  .tpl-card .de{font-size:10px;color:var(--ink-300);margin-top:2px;}
  .tpl-card.selected{border-color:var(--gold-500);box-shadow:0 0 0 1.5px var(--gold-500), var(--shadow-sm);}
  .tpl-card.selected .badge{background:var(--gold-500);color:var(--ink-900);}

  .workspace{display:grid;grid-template-columns:320px 1fr;gap:22px;align-items:start;}
  @media (max-width:900px){.workspace{grid-template-columns:1fr;}}

  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow-sm);}
  .panel h3{margin:0 0 14px;font-size:14px;color:var(--ink-700);font-weight:700;display:flex;align-items:center;gap:7px;
    padding-bottom:10px;border-bottom:1px solid var(--line-2);}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-500);margin-bottom:6px;text-transform:none;}
  .field textarea,.field input[type=text],.field select,.field input[type=number]{
    width:100%;padding:9px 11px;border:1.3px solid var(--line);border-radius:var(--radius-sm);font-family:'Cairo';
    font-size:13.5px;color:var(--ink-900);background:var(--parchment);
  }
  .field textarea{resize:vertical;min-height:56px;}
  .range-row{display:flex;align-items:center;gap:9px;font-size:12px;color:var(--ink-500);}
  .range-row input[type=range]{width:100%;accent-color:var(--gold-500);}
  .range-row output{min-width:28px;text-align:center;font-weight:700;color:var(--ink-700);}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .swatches{display:flex;gap:7px;flex-wrap:wrap;}
  .swatch{width:23px;height:23px;border-radius:50%;cursor:pointer;border:2px solid #fff;box-shadow:0 0 0 1.3px var(--line);}
  .swatch.selected{box-shadow:0 0 0 2.3px var(--gold-500);}
  .font-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .font-choice{border:1.3px solid var(--line);border-radius:var(--radius-sm);padding:8px 6px;text-align:center;
    cursor:pointer;font-size:14px;background:var(--parchment);}
  .font-choice.selected{border-color:var(--gold-500);background:var(--gold-100);}
  .font-choice small{display:block;font-size:9.5px;color:var(--ink-300);margin-top:3px;font-family:'Cairo';}
  .chip{padding:7px 6px;border-radius:var(--radius-sm);border:1.3px solid var(--line);background:var(--parchment);
    cursor:pointer;font-size:11.5px;text-align:center;font-weight:600;color:var(--ink-700);}
  .chip.selected{background:var(--ink-700);color:#fff;border-color:var(--ink-700);}
  .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
  .upload-btn{display:block;text-align:center;border:1.5px dashed var(--sage-300);border-radius:var(--radius-sm);padding:12px;
    font-size:11.5px;color:var(--sage-600);cursor:pointer;background:#f4f8f7;font-weight:700;}
  .remove-img{font-size:10.5px;color:var(--danger);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Cairo';margin-top:6px;}
  .regen-btn{width:100%;padding:10px;border-radius:var(--radius-sm);border:1.3px solid var(--sage-600);background:#fff;
    color:var(--sage-600);font-family:'Cairo';font-weight:700;font-size:12.5px;cursor:pointer;margin-top:2px;}
  .toggle-row{display:flex;align-items:center;gap:8px;}
  .toggle-row input{accent-color:var(--gold-500);}

  /* ---------- preview / sheet ---------- */
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .sheet-scale{width:100%;max-width:720px;}
  .sheet{width:100%;min-height:980px;aspect-ratio:210/297;background:var(--paper);box-shadow:var(--shadow-md);
    border-radius:2px;padding:28px 32px;position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .sheet::before{content:"";position:absolute;inset:7px;border:1px solid var(--gold-300);pointer-events:none;}
  .sheet::after{content:"";position:absolute;inset:11px;border:1px solid var(--line);pointer-events:none;}

  .sheet.guide-mode{aspect-ratio:auto;min-height:0;}
  .sheet.guide-mode .sheet-body{overflow:visible;gap:4px;}

  .guide-title{font-size:19px;color:var(--ink-700);font-weight:800;margin-bottom:4px;}
  .guide-h2{font-size:13.5px;color:var(--gold-600);font-weight:800;margin:16px 0 8px;
    border-bottom:1px solid var(--line-2);padding-bottom:4px;}
  .guide-p{font-size:12px;line-height:1.85;color:var(--ink-700);margin-bottom:9px;}
  .guide-list{margin:0 0 12px;padding:0;list-style:none;}
  .guide-list li{font-size:12px;line-height:1.75;color:var(--ink-700);padding-right:15px;position:relative;margin-bottom:5px;}
  .guide-list li::before{content:'•';color:var(--gold-500);position:absolute;right:0;font-weight:800;}
  .guide-list.ltr{text-align:left;}
  .guide-list.ltr li{padding-right:0;padding-left:15px;}
  .guide-list.ltr li::before{right:auto;left:0;}
  .g-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:16px;}
  .g-table th{background:var(--ink-900);color:#fff;padding:7px 9px;text-align:right;font-weight:700;font-size:10.5px;}
  .g-table td{padding:7px 9px;border-bottom:1px solid var(--line-2);vertical-align:top;text-align:right;color:var(--ink-700);}
  .g-table tr:nth-child(even) td{background:var(--parchment);}
  .g-table.ltr th, .g-table.ltr td{text-align:left;}

  .id-header{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:12px;
    padding-bottom:12px;border-bottom:1.5px solid var(--gold-500);z-index:3;position:relative;background:var(--paper);}
  .id-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex:none;}
  .id-left img{width:82px;height:82px;border-radius:50%;object-fit:cover;border:2.5px solid var(--gold-300);}
  .id-left .id-date{font-size:9px;color:var(--ink-500);font-weight:600;white-space:nowrap;}
  .id-right{text-align:right;}
  .id-right .id-name{font-family:'Noto Naskh Arabic',serif;font-size:20px;color:var(--ink-700);font-weight:700;
    letter-spacing:.4px;line-height:1.3;}
  .id-right .id-name-rule{width:120px;height:1.5px;background:var(--gold-500);margin:3px 0 4px auto;}
  .id-right .id-role{font-size:10.5px;color:var(--gold-600);font-weight:700;}
  .id-right .id-spec{font-size:9.5px;color:var(--ink-300);margin-top:1px;}
  .id-right .id-phone{font-size:11px;color:var(--ink-700);font-weight:700;margin-top:3px;direction:ltr;display:inline-block;}
  .sheet-name-line{font-size:10px;color:var(--ink-300);border-bottom:1px dashed var(--line-2);padding-bottom:6px;
    margin-bottom:12px;z-index:2;position:relative;}

  .sheet-body{flex:1;position:relative;z-index:1;display:flex;flex-direction:column;gap:13px;overflow:hidden;}

  .trace-row{position:relative;padding:8px 2px 13px;}
  .guide-mid{position:absolute;right:0;left:0;top:52%;border-top:1.5px dashed var(--line);}
  .guide-base{position:absolute;right:0;left:0;bottom:2px;border-top:2px solid var(--sage-300);}
  .trace-text{position:relative;z-index:2;white-space:nowrap;overflow:hidden;line-height:1;padding:0 2px;letter-spacing:2px;}
  .style-outline{color:transparent;-webkit-text-stroke:1.1px #9fb0a9;}
  .style-faint{color:rgba(31,59,87,.28);}

  .flashcard{text-align:center;background:linear-gradient(180deg,#fff,var(--parchment));border:1.5px solid var(--gold-300);
    border-radius:var(--radius);padding:10px 6px 6px;margin-bottom:10px;}
  .flashcard .fc-letter{font-size:96px;line-height:1;color:var(--ink-700);font-weight:700;}
  .flashcard .fc-label{font-size:9.5px;color:var(--gold-600);font-weight:700;letter-spacing:.4px;margin-bottom:2px;}
  .wp-illustration{text-align:center;padding:14px 6px 4px;}
  .wp-illustration .wp-emoji{font-size:100px;line-height:1;}
  .wp-illustration img{max-width:60%;max-height:200px;border-radius:10px;margin:0 auto;display:block;}
  .wp-illustration .wp-word{margin-top:10px;font-size:30px;font-weight:700;color:var(--ink-700);}
  .emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
  .emoji-choice{border:1.3px solid var(--line);border-radius:var(--radius-sm);padding:6px 0;text-align:center;
    font-size:18px;cursor:pointer;background:var(--parchment);}
  .emoji-choice.selected{border-color:var(--gold-500);background:var(--gold-100);}
  .wp-coloring{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:6px;
    overflow:hidden;min-height:0;}
  .wp-coloring-text{color:#fff;-webkit-text-stroke:5px var(--ink-900);line-height:1;white-space:nowrap;
    font-weight:800;text-shadow:none;filter:none;}
  .words-forms{display:flex;gap:9px;justify-content:space-between;}
  .word-card{flex:1;text-align:center;background:var(--parchment);border:1px solid var(--gold-300);border-radius:var(--radius-sm);padding:9px 6px;}
  .word-card .pos-label{font-size:9.5px;color:var(--gold-600);font-weight:700;margin-bottom:3px;}
  .word-card .wd{font-family:'Noto Naskh Arabic',serif;font-size:22px;color:var(--ink-700);}
  .word-card .em{font-size:18px;}

  .letter-boxes{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;}
  .letter-box{width:58px;height:58px;border:1.5px dashed var(--sage-300);border-radius:var(--radius-sm);display:flex;
    align-items:center;justify-content:center;font-size:30px;color:transparent;-webkit-text-stroke:1.1px #9fb0a9;}

  .reading-list{display:flex;flex-direction:column;gap:9px;}
  .reading-item{display:flex;align-items:center;gap:10px;border-bottom:1px dashed var(--line-2);padding-bottom:7px;}
  .reading-num{width:20px;height:20px;border-radius:50%;background:var(--ink-700);color:#fff;font-size:10px;
    display:flex;align-items:center;justify-content:center;flex:none;}

  .dict-list{display:flex;flex-direction:column;gap:14px;}
  .dict-item{display:flex;align-items:center;gap:10px;}
  .dict-num{width:20px;height:20px;border-radius:50%;background:var(--sage-600);color:#fff;font-size:10px;
    display:flex;align-items:center;justify-content:center;flex:none;}
  .dict-line{flex:1;border-bottom:1.5px solid var(--ink-300);height:26px;position:relative;}
  .dict-line .answer{position:absolute;bottom:2px;right:2px;font-size:11px;color:#c9cfd3;}

  .count-row{display:flex;align-items:center;gap:14px;border-bottom:1px dashed var(--line-2);padding-bottom:9px;}
  .count-shapes{flex:1;display:flex;flex-wrap:wrap;gap:4px;font-size:20px;line-height:1;}
  .count-box{width:42px;height:42px;border:1.5px dashed var(--sage-300);border-radius:var(--radius-sm);display:flex;
    align-items:center;justify-content:center;font-size:18px;color:var(--ink-300);flex:none;}

  .problem-row{display:flex;align-items:center;justify-content:center;gap:9px;border-bottom:1px dashed var(--line-2);
    padding:9px 0;font-size:19px;}
  .problem-shapes{display:flex;gap:3px;flex-wrap:wrap;max-width:140px;}
  .problem-op{font-weight:800;color:var(--ink-700);font-size:22px;}
  .problem-eq-box{width:46px;height:40px;border:1.5px dashed var(--sage-300);border-radius:var(--radius-sm);}

  .seq-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;padding:10px 0;}
  .seq-cell{min-width:44px;height:44px;padding:0 6px;border-radius:var(--radius-sm);display:flex;align-items:center;
    justify-content:center;font-size:18px;font-weight:700;}
  .seq-cell.filled{background:var(--parchment);border:1px solid var(--line);color:var(--ink-700);}
  .seq-cell.blank{border:1.5px dashed var(--gold-500);color:var(--gold-500);background:#fff;}

  .print-footer{display:flex;align-items:center;justify-content:center;gap:8px;border-top:1px solid var(--gold-300);
    padding-top:7px;margin-top:auto;z-index:2;position:relative;}
  .print-footer .pf-text{font-size:9.5px;color:var(--ink-700);text-align:center;font-weight:600;}

  .actions-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
  .action-btn{display:flex;align-items:center;gap:7px;padding:11px 22px;border-radius:var(--radius-sm);border:1.3px solid transparent;
    cursor:pointer;font-family:'Cairo';font-weight:700;font-size:13px;}
  .action-btn.primary{background:var(--gold-500);color:var(--ink-900);}
  .action-btn.secondary{background:var(--ink-900);color:#fff;}
  .action-btn.ghost{background:transparent;border-color:var(--line);color:var(--ink-700);}
  .action-btn svg{width:15px;height:15px;}

  @page{size:A4;margin:10mm;}
  @media print{
    body *{visibility:hidden;}
    .sheet,.sheet *{visibility:visible;}
    .sheet{position:fixed;inset:0;width:100%;height:100%;box-shadow:none;border-radius:0;aspect-ratio:auto;
      padding:40mm 16mm 20mm;min-height:0;}
    .id-header{position:fixed;top:10mm;left:16mm;right:16mm;background:var(--paper);}
    .print-footer{position:fixed;bottom:8mm;left:16mm;right:16mm;background:var(--paper);}
    .sheet.guide-mode{position:static;width:100%;height:auto;box-shadow:none;border-radius:0;
      padding:34mm 16mm 20mm;min-height:0;}
    .sheet.guide-mode .sheet-body{overflow:visible;}
    .sheet.guide-mode .g-table{break-inside:auto;}
    .sheet.guide-mode .g-table tr{break-inside:avoid;}
    .batch-print .sheet{position:static !important;width:100%;height:auto;box-shadow:none;border-radius:0;
      aspect-ratio:auto;padding:34mm 16mm 20mm;min-height:0;page-break-after:always;}
    .batch-print .sheet:last-child{page-break-after:auto;}
    .batch-print .sheet .sheet-body{overflow:visible;}
  }

function loadAuth(){
  try{
    const raw = localStorage.getItem(AUTH_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  const def = { phone:DEFAULT_PHONE, password:DEFAULT_PASSWORD, isDefault:true };
  try{ localStorage.setItem(AUTH_KEY, JSON.stringify(def)); }catch(e){}
  return def;
}
function saveAuth(a){ try{ localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }catch(e){} }

let auth = loadAuth();

function renderLoginScreen(errorMsg){
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <img src="${LOGO_SMALL}" alt="شعار">
    <h2>تسجيل الدخول</h2>
    <p class="sub">مُيسِّر — حسن عبدالحميد، أخصائي التربية الخاصة</p>
    <div class="auth-field"><label>رقم الهاتف</label><input type="text" id="loginPhone" inputmode="numeric" placeholder="01xxxxxxxxx"></div>
    <div class="auth-field"><label>كلمة السر</label><input type="password" id="loginPass" placeholder="••••••"></div>
    <button class="auth-submit" id="loginBtn">دخول</button>
    <div class="auth-error">${errorMsg||''}</div>
    ${auth.isDefault ? `<div class="auth-hint">أول مرة تدخل؟ استخدم البيانات الافتراضية:<br>الهاتف: ${DEFAULT_PHONE} — كلمة السر: ${DEFAULT_PASSWORD}<br>هيُطلب منك بعدها تسجيل بياناتك الجديدة.</div>` : ''}
  `;
  document.getElementById('loginBtn').onclick = ()=>{
    const phone = document.getElementById('loginPhone').value.trim();
    const pass = document.getElementById('loginPass').value;
    if(phone===auth.phone && pass===auth.password){
      if(auth.isDefault) renderSetupScreen();
      else enterApp();
    } else {
      renderLoginScreen('رقم الهاتف أو كلمة السر غير صحيحة');
    }
  };
}

function renderSetupScreen(){
  const card = document.getElementById('authCard');
  card.innerHTML = `
    <img src="${LOGO_SMALL}" alt="شعار">
    <h2>تسجيل بياناتك الجديدة</h2>
    <p class="sub">هذه أول مرة تسجّل دخول — من فضلك حدّد رقم هاتفك وكلمة سر جديدة</p>
    <div class="auth-field"><label>رقم الهاتف الجديد</label><input type="text" id="newPhone" inputmode="numeric" value="${DEFAULT_PHONE}"></div>
    <div class="auth-field"><label>كلمة السر الجديدة</label><input type="password" id="newPass" placeholder="••••••"></div>
    <div class="auth-field"><label>تأكيد كلمة السر</label><input type="password" id="newPass2" placeholder="••••••"></div>

  document.getElementById('setupBtn').onclick = ()=>{
    const phone = document.getElementById('newPhone').value.trim();
    const p1 = document.getElementById('newPass').value;
    const p2 = document.getElementById('newPass2').value;
    if(!phone || !p1){ document.getElementById('setupError').textContent='من فضلك أكمل كل الحقول'; return; }
    if(p1 !== p2){ document.getElementById('setupError').textContent='كلمة السر غير متطابقة'; return; }
    auth = { phone, password:p1, isDefault:false };
    saveAuth(auth);
    enterApp();
  };
}

function enterApp(){

function showSection(key){
  state.subject = key;

  document.getElementById('queueScreen').style.display='none';
  renderAll();

function currentTemplateTitle(){

  const sheetEl = document.getElementById('sheet');

  const n = printQueue.length;

}

function removeFromQueue(idx){
  printQueue.splice(idx,1);

}

function clearQueue(){
  printQueue = [];
  updateQueueBadges();
  renderQueueScreen();
}

function renderQueueScreen(){
  const wrap = document.getElementById('queueScreen');
  const backBtn = `<button class="back-btn" id="queueBackBtn">→ الرئيسية</button>`;
  if(printQueue.length===0){
    wrap.innerHTML = `<div class="section-topbar">${backBtn}</div>

      </div>`;
    document.getElementById('queueBackBtn').onclick = goHome;
    return;
  }
  const items = printQueue.map((item,i)=>`
    <div class="queue-item">
      <div class="qi-num">${i+1}</div>
      <div class="qi-title">${item.title}</div>
      <button class="qi-remove" data-idx="${i}">✕</button>
    </div>`).join('');
  wrap.innerHTML = `<div class="section-topbar">${backBtn}</div>

      <div class="queue-title">🖨️ قائمة الطباعة (${printQueue.length} صفحة)</div>

        <button class="action-btn primary" id="printAllBtn">🖨️ طباعة الكل كملف واحد</button>
        <button class="action-btn secondary" id="pdfAllBtn">⬇️ تحميل PDF للكل</button>
        <button class="action-btn danger" id="clearQueueBtn">🗑️ إفراغ القائمة</button>
      </div>
    </div>`;
  document.getElementById('queueBackBtn').onclick = goHome;
  document.getElementById('printAllBtn').onclick = printAllQueue;
  document.getElementById('pdfAllBtn').onclick = exportAllQueuePDF;
  document.getElementById('clearQueueBtn').onclick = clearQueue;
  wrap.querySelectorAll('.qi-remove').forEach(btn=>{
    btn.onclick = ()=> removeFromQueue(+btn.dataset.idx);
  });
}

function printAllQueue(){
  if(printQueue.length===0) return;
  const container = document.createElement('div');
  container.className = 'batch-print';
  container.innerHTML = printQueue.map(item=>item.html).join('');
  document.body.appendChild(container);
  window.print();
  setTimeout(()=>{ if(container.parentNode) container.parentNode.removeChild(container); }, 800);
}

async function exportAllQueuePDF(){
  if(printQueue.length===0) return;
  const btn = document.getElementById('pdfAllBtn');
  const oldLabel = btn ? btn.innerHTML : '';
  if(btn) btn.innerHTML = '⏳ جاري التجهيز...';
  const container = document.createElement('div');
  container.style.cssText = 'position:fixed;left:-9999px;top:0;width:760px;';
  container.innerHTML = printQueue.map(item=>item.html).join('');
  document.body.appendChild(container);
  await new Promise(r=>setTimeout(r,80));
  try{
    const sheets = container.querySelectorAll('.sheet');
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p','mm','a4');
    const pageWidth = 210, pageHeight = 297;
    for(let i=0;i<sheets.length;i++){
      const canvas = await html2canvas(sheets[i], {scale:2, backgroundColor:'#fffefb'});
      const imgData = canvas.toDataURL('image/png');
      const imgProps = pdf.getImageProperties(imgData);
      let imgH = pageWidth * (imgProps.height/imgProps.width);
      if(imgH > pageHeight) imgH = pageHeight;
      if(i>0) pdf.addPage();
      pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgH);
    }
    pdf.save('صفحات_مجمعة.pdf');
  } finally {
    document.body.removeChild(container);
    if(btn) btn.innerHTML = oldLabel;
  }
}

function fieldFontGrid(list, current, onPick){
  const wrap = el(`<div class="font-grid"></div>`);
  list.forEach(f=>{
    const item = el(`<div class="font-choice ${current===f.id?'selected':''}" style="font-family:${f.family}">Aa<small>${f.label}</small></div>`);
    item.onclick=()=>onPick(f.id);
    wrap.appendChild(item);
  });
  return wrap;
}
function rangeField(labelText, val, min, max, onInput){
  const wrap = el(`<div class="field"><label>${labelText}: <output>${val}</output></label></div>`);
  const r = el(`<input type="range" min="${min}" max="${max}" value="${val}">`);
  r.oninput = e=>{ const v=+e.target.value; wrap.querySelector('output').textContent=v; onInput(v); };
  wrap.appendChild(r);
  return wrap;
}
function sizeField(val, onInput){
  const wrap = el(`<div class="field"><label>حجم الخط</label></div>`);
  const rs = el(`<div class="range-row"><input type="range" min="20" max="90" value="${val}"><output>${val}</output></div>`);
  rs.querySelector('input').oninput = e=>{ const v=+e.target.value; rs.querySelector('output').textContent=v; onInput(v); };
  wrap.appendChild(rs);
  return wrap;
}
function styleChips(current, onPick){
  const wrap = el(`<div class="field"><label>نمط التتبّع</label><div class="chip-row"></div></div>`);
  [['outline','مجوّف'],['faint','باهت']].forEach(([v,l])=>{
    const c = el(`<div class="chip ${current===v?'selected':''}">${l}</div>`);
    c.onclick=()=>onPick(v);
    wrap.querySelector('.chip-row').appendChild(c);
  });
  return wrap;
}

function fitColoringText(){
  const textEl = document.getElementById('wpColoringText');
  const container = textEl ? textEl.closest('.wp-coloring') : null;
  if(!textEl || !container) return;
  const run = ()=>{
    const maxWidth = container.clientWidth * 0.96;
    const maxHeight = container.clientHeight * 0.94;
    let size = 400;
    textEl.style.fontSize = size + 'px';
    for(let i=0;i<60;i++){
      const rect = textEl.getBoundingClientRect();
      if(rect.width <= maxWidth && rect.height <= maxHeight) break;
      size -= 6;
      if(size < 24) break;
      textEl.style.fontSize = size + 'px';
    }
  };
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(run); }
  setTimeout(run, 60);
}

      panel.appendChild(rangeField('عدد أسطر التتبّع', s.rows, 1, 8, v=>{ s.rows=v; renderSheet(); }));
      panel.appendChild(sizeField(s.size, v=>{ s.size=v; renderSheet(); }));
      panel.appendChild(styleChips(s.style, v=>{ s.style=v; renderControls(); renderSheet(); }));
    }
  }

  else if(tpl==='numtrace'){
    const s = store.numtrace;
    panel.appendChild(el(`<h3>🔢 تتبّع الأرقام</h3>`));
    const f1 = el(`<div class="field"><label>الرقم</label></div>`);
    const sel = el(`<select></select>`);
    for(let i=0;i<=20;i++){ const o=document.createElement('option'); o.value=i; o.textContent=i; if(i===s.number)o.selected=true; sel.appendChild(o); }
    sel.onchange = e=>{ s.number=+e.target.value; renderSheet(); };
    f1.appendChild(sel); panel.appendChild(f1);
    panel.appendChild(rangeField('عدد أسطر التتبّع', s.rows, 1, 8, v=>{ s.rows=v; renderSheet(); }));
    panel.appendChild(sizeField(s.size, v=>{ s.size=v; renderSheet(); }));
    const f4 = el(`<div class="field"><label>شكل الأرقام</label><div class="chip-row" id="nIndic"></div></div>`);
    panel.appendChild(f4);
    [[false,'1 2 3'],[true,'١ ٢ ٣']].forEach(([v,l])=>{
      const c = el(`<div class="chip ${s.useIndic===v?'selected':''}">${l}</div>`);
      c.onclick=()=>{ s.useIndic=v; renderControls(); renderSheet(); };
      f4.querySelector('.chip-row').appendChild(c);
    });
  }

  else if(tpl==='counting'){
    const s = store.counting;
    panel.appendChild(el(`<h3>⭐ العدّ والمطابقة</h3>`));
    const f1 = el(`<div class="field two-col">
      <div><label>من</label><input type="number" id="cFrom" min="1" max="20" value="${s.from}"></div>
      <div><label>إلى</label><input type="number" id="cTo" min="1" max="20" value="${s.to}"></div></div>`);

    document.getElementById('cFrom').oninput = e=>{ s.from=+e.target.value; renderSheet(); };
    document.getElementById('cTo').oninput = e=>{ s.to=+e.target.value; renderSheet(); };
    const f2 = el(`<div class="field"><label>الشكل</label><div class="chip-row" id="cShape"></div></div>`);
    panel.appendChild(f2);
    SHAPE_OPTIONS.forEach(sh=>{
      const c = el(`<div class="chip ${s.shape===sh.id?'selected':''}">${sh.ch}</div>`);
      c.onclick=()=>{ s.shape=sh.id; renderControls(); renderSheet(); };
      f2.querySelector('.chip-row').appendChild(c);
    });
  }

  else if(tpl==='addition'){
    const s = store.addition;
    panel.appendChild(el(`<h3>➕ الجمع والطرح</h3>`));
    const f1 = el(`<div class="field"><label>العملية</label><div class="chip-row" id="aOp"></div></div>`);
    panel.appendChild(f1);
    [['add','جمع +'],['sub','طرح −']].forEach(([v,l])=>{
      const c = el(`<div class="chip ${s.op===v?'selected':''}">${l}</div>`);
      c.onclick=()=>{ s.op=v; s.problems=null; renderControls(); renderSheet(); };
      f1.querySelector('.chip-row').appendChild(c);
    });
    panel.appendChild(rangeField('عدد المسائل', s.count, 2, 10, v=>{ s.count=v; s.problems=null; renderSheet(); }));
    panel.appendChild(rangeField('أقصى رقم', s.maxNum, 3, 10, v=>{ s.maxNum=v; s.problems=null; renderSheet(); }));
    const f4 = el(`<div class="field"><label>الشكل</label><div class="chip-row" id="aShape"></div></div>`);
    panel.appendChild(f4);
    SHAPE_OPTIONS.forEach(sh=>{
      const c = el(`<div class="chip ${s.shape===sh.id?'selected':''}">${sh.ch}</div>`);
      c.onclick=()=>{ s.shape=sh.id; renderControls(); renderSheet(); };
      f4.querySelector('.chip-row').appendChild(c);
    });
    const regen = el(`<button class="regen-btn">🎲 توليد مسائل جديدة</button>`);
    regen.onclick = ()=>{ s.problems=null; renderSheet(); };
    panel.appendChild(regen);
  }

  else if(tpl==='sequence'){
    const s = store.sequence;
    panel.appendChild(el(`<h3>🔗 تسلسل الأعداد</h3>`));
    const f1 = el(`<div class="field two-col">
      <div><label>يبدأ من</label><input type="number" id="sStart" min="0" max="100" value="${s.start}"></div>
      <div><label>عدد الخانات</label><input type="number" id="sLen" min="4" max="15" value="${s.length}"></div></div>`);
    panel.appendChild(f1);
    document.getElementById('sStart').oninput = e=>{ s.start=+e.target.value; renderSheet(); };
    document.getElementById('sLen').oninput = e=>{ s.length=+e.target.value; renderSheet(); };
    panel.appendChild(rangeField('إخفاء كل', s.blankEvery, 2, 5, v=>{ s.blankEvery=v; renderSheet(); }));
    const f4 = el(`<div class="field"><label>شكل الأرقام</label><div class="chip-row" id="seqIndic"></div></div>`);
    panel.appendChild(f4);
    [[false,'1 2 3'],[true,'١ ٢ ٣']].forEach(([v,l])=>{
      const c = el(`<div class="chip ${s.useIndic===v?'selected':''}">${l}</div>`);
      c.onclick=()=>{ s.useIndic=v; renderControls(); renderSheet(); };
      f4.querySelector('.chip-row').appendChild(c);
    });
  }

  else if(tpl.startsWith('guide')){
    const GUIDE_TITLES = {
      guideIntro:['📋 مبادئ عامة','قواعد أساسية تنطبق على أي خطة تدخل، مهما كانت المادة.'],
      guideArabic:['📖 خطة العربية','مراحل التأسيس، علامات الصعوبة، والاستراتيجيات المرتبطة بنماذج التطبيق.'],
      guideEnglish:['🔤 English Plan','Foundation stages, difficulty signs, and matching app templates.'],
      guideMath:['🔢 خطة الرياضيات','مراحل التأسيس الحسابي وعلامات عسر الحساب والاستراتيجيات المناظرة.'],
      guideProgress:['📈 متابعة التقدّم','جدول أسبوعي لتوثيق مستوى إتقان كل مهارة — اطبعه واملأه يدويًا.'],
    };
    const [title, desc] = GUIDE_TITLES[tpl];
    panel.appendChild(el(`<h3>${title}</h3>`));
    panel.appendChild(el(`<div class="guide-p" style="color:var(--ink-500);">${desc}</div>`));
    panel.appendChild(el(`<div class="guide-p" style="color:var(--gold-600);font-weight:700;margin-top:10px;">💡 هذا القسم جاهز للطباعة مباشرة — استخدم زر "طباعة" أو "تحميل PDF" أدناه.</div>`));
  }
}

  sheet.classList.toggle('guide-mode', tpl.startsWith('guide'));

    const s = store.letter;
    const L = LETTERS.find(x=>x.ch===s.letter);
    sheet.innerHTML = `${sheetHead()}

        <div class="flashcard">
          <div class="fc-label">الشكل الصحيح للحرف</div>

        <div class="words-forms">
          <div class="word-card"><div class="pos-label">أول الكلمة</div><div class="em">${L.em}</div><div class="wd">${L.first}</div></div>
          <div class="word-card"><div class="pos-label">وسط الكلمة</div><div class="wd">${L.middle}</div></div>
          <div class="word-card"><div class="pos-label">آخر الكلمة</div><div class="wd">${L.last}</div></div>

      </div>${sheetFooter()}`;

  else if(tpl==='wordEn'){

        </div>${sheetFooter()}`;

    if(s.mode==='illustration'){
      const visual = s.image ? `<img src="${s.image}">` : `<div class="wp-emoji">${s.emoji}</div>`;

    const to = Math.max(s.from, s.to);
    for(let n=from; n<=to; n++){
      rows += `<div class="count-row"><div class="count-shapes">${Array(n).fill(shapeCh).join(' ')}</div><div class="count-box">؟</div></div>`;
    }
    sheet.innerHTML = `${sheetHead()}<div class="sheet-body">${rows}</div>${sheetFooter()}`;
  }
  else if(tpl==='addition'){
    const s = store.addition;
    const shapeCh = SHAPE_OPTIONS.find(sh=>sh.id===s.shape).ch;
    if(!s.problems){
      s.problems = [];
      for(let i=0;i<s.count;i++){
        let a = 1+Math.floor(Math.random()*s.maxNum);
        let b = 1+Math.floor(Math.random()*s.maxNum);
        if(s.op==='sub' && b>a){ const tmp=a; a=b; b=tmp; }
        s.problems.push([a,b]);
      }

        <div class="problem-shapes">${Array(a).fill(shapeCh).join('')}</div>

        <div class="problem-shapes">${Array(b).fill(shapeCh).join('')}</div>

      ])}
      ${gH2('علامات الصعوبة الشائعة')}
      ${gList([
        'عكس أو تشابه الحروف المتقاربة شكلاً (ب - ت - ث) أو (د - ذ) أو (ر - ز).',

      ${gTable(['الصعوبة','الاستراتيجية المقترحة','النموذج في التطبيق'],[
        ['تشابه/عكس الحروف','دراسة الحرفين المتشابهين معًا وإبراز الفرق بالتلوين','تتبّع حرف — بالتبادل بنفس الجلسة'],

  else if(tpl==='guideMath'){

      ])}
      ${gH2('الاستراتيجية والنموذج المناظر في التطبيق')}

        ['ضعف تسلسل الأرقام','تدريب يومي قصير على إكمال تسلسلات بفجوات متدرجة','تسلسل الأعداد'],
        ['ضعف الحس العددي','ربط الرقم بكمية بصرية حقيقية قبل التجريد','العدّ والمطابقة'],
        ['خلط الجمع/الطرح','تدريب كل عملية منفصلة تمامًا قبل الخلط بينهما','الجمع والطرح'],

      ])}

        ['الأحد','مطابقة العدد بالكمية','العدّ والمطابقة','15 د'],
        ['الاثنين','تسلسل أعداد بفجوات بسيطة','تسلسل الأعداد','10 د'],
        ['الثلاثاء','مسائل جمع بصرية فقط','الجمع والطرح','15 د'],
        ['الأربعاء','مراجعة عامة للأسبوع','حسب الحاجة','15 د'],
        ['الخميس','تقييم قصير: تسلسل + مطابقة','تسلسل + عدّ ومطابقة','10 د'],
      ])}
    </div>${sheetFooter()}`;

  else if(tpl==='guideProgress'){
    const blankRows = Array(8).fill(['.....................','..... / ..... / .....','مبتدئ □  متوسط □  متقن □','..............................']);
    sheet.innerHTML = `${sheetHead()}<div class="sheet-body">
      <div class="guide-title">نموذج متابعة تقدّم الطفل</div>
      <div class="guide-p">استخدم هذا الجدول أسبوعيًا لتوثيق مستوى إتقان كل مهارة وملاحظات سريعة للجلسة القادمة.</div>
      ${gTable(['المهارة','تاريخ البدء','المستوى الحالي','ملاحظات'], blankRows)}
    </div>${sheetFooter()}`;

function gH2(t){ return `<div class="guide-h2">${t}</div>`; }
function gList(items, align){
  const cls = align==='left' ? 'guide-list ltr' : 'guide-list';
  return `<ul class="${cls}">${items.map(i=>`<li>${i}</li>`).join('')}</ul>`;
}
function gTable(headers, rows, align){
  const cls = align==='left' ? 'g-table ltr' : 'g-table';
  return `<table class="${cls}"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
}

function renderAll(){ renderSectionTopbar(); renderSubjectTabs(); renderGallery(); renderControls(); renderSheet(); }

/* ---------------- Export ---------------- */
async function exportPDF(){
  const sheet = document.getElementById('sheet');
  const canvas = await html2canvas(sheet, {scale:2, backgroundColor:'#fffefb'});
  const imgData = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p','mm','a4');
  const pageWidth = 210, pageHeight = 297;
  const imgProps = pdf.getImageProperties(imgData);
  let imgH = pageWidth * (imgProps.height/imgProps.width);
  if(imgH > pageHeight) imgH = pageHeight;
  pdf.addImage(imgData, 'PNG', 0, 0, pageWidth, imgH);
  pdf.save('نموذج_تعليمي.pdf');
}
async function exportPNG(){
  const sheet = document.getElementById('sheet');
  const canvas = await html2canvas(sheet, {scale:2, backgroundColor:'#fffefb'});
  const link = document.createElement('a');
  link.download = 'نموذج_تعليمي.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

/* ---------------- PWA install & SW ---------------- */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBtn').classList.add('show');
});
document.getElementById('installBtn').onclick = async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('installBtn').classList.remove('show');
};
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}

document.getElementById('logoutBtn').onclick = ()=>{
  document.getElementById('appRoot').style.display='none';
  document.getElementById('authScreen').style.display='flex';
  renderLoginScreen();
};
</script>
